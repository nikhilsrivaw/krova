name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run Alembic migrations
        working-directory: krova
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          pip install poetry==1.8.3
          poetry install --only main
          poetry run alembic upgrade head

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service krova-api --detach

  deploy-workers:
    name: Deploy Workers to Railway
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy worker services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service krova-worker-messages --detach
          railway up --service krova-worker-email --detach
          railway up --service krova-worker-analysis --detach
          railway up --service krova-worker-notifications --detach
          railway up --service krova-worker-actions --detach

  deploy-dashboard:
    name: Deploy Dashboard to Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
          working-directory: krova-dashboard
          vercel-args: '--prod'
